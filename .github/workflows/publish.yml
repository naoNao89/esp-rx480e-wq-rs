name: Publish

on:
  release:
    types: [published]

jobs:
  publish-driver:
    name: Publish rx480e-wq-driver
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare standalone crate
        run: |
          mkdir -p /tmp/rx480e-wq-driver
          cp -R crates/drivers/Cargo.toml crates/drivers/README.md crates/drivers/src crates/drivers/tests crates/drivers/examples /tmp/rx480e-wq-driver/
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/rx480e-wq-driver/Cargo.toml')
          text = path.read_text()
          text = text.replace('version.workspace = true', 'version = "0.1.1"')
          text = text.replace('edition.workspace = true', 'edition = "2021"')
          text = text.replace('license.workspace = true', 'license = "MIT"')
          path.write_text(text)
          PY
      - name: Check whether version is already published
        id: crate
        working-directory: /tmp/rx480e-wq-driver
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; data=json.load(sys.stdin); print(data['packages'][0]['version'])")
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/rx480e-wq-driver/$version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$status" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify package
        if: steps.crate.outputs.published == 'false'
        working-directory: /tmp/rx480e-wq-driver
        run: cargo publish --dry-run
      - name: Publish package
        if: steps.crate.outputs.published == 'false'
        working-directory: /tmp/rx480e-wq-driver
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
